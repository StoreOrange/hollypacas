<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="New York">
  <defs>
    <linearGradient id="bg-new-york" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a120e">
        <animate attributeName="stop-color" values="#2a120e;#6f2618;#2a120e" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#6f2618">
        <animate attributeName="stop-color" values="#6f2618;#2a120e;#6f2618" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="halo-new-york" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#f7b267" stop-opacity=".70"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-new-york" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#bg-new-york)"/>
  <circle cx="320" cy="210" r="154" fill="url(#halo-new-york)" filter="url(#blur-new-york)">
    <animate attributeName="r" values="146;164;146" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <path d="M58 84c118-62 406-74 522 10" stroke="rgba(255,255,255,.10)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <path d="M84 368c136 64 346 64 472 0" stroke="rgba(255,255,255,.08)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <g opacity=".16">
    <circle cx="114" cy="118" r="14" fill="#fff"/>
    <circle cx="544" cy="120" r="10" fill="#fff"/>
    <circle cx="84" cy="322" r="8" fill="#fff"/>
    <circle cx="572" cy="306" r="12" fill="#fff"/>
  </g>
  
  <g transform="translate(0 2)">
    <ellipse cx="320" cy="222" rx="108" ry="74" fill="rgba(255,255,255,.16)" stroke="rgba(255,255,255,.65)" stroke-width="6"/>
    <path d="M252 236c0-46 38-78 88-78 48 0 82 28 82 72 0 46-34 80-84 80-52 0-86-28-86-74z" fill="rgba(255,255,255,.24)"/>
    <path d="M282 214c20-12 38-12 58 0" stroke="#fff2df" stroke-width="8" stroke-linecap="round"/>
    <path d="M300 248c22-8 40-8 60 4" stroke="#ffe7d6" stroke-width="7" stroke-linecap="round"/>
    <path d="M274 186c18-10 38-12 66-2" stroke="#ffe7d6" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(48 42)">
    <rect x="0" y="0" width="236" height="36" rx="18" fill="rgba(255,255,255,.14)" stroke="rgba(255,255,255,.18)"/>
    <text x="18" y="24" fill="#eef7ff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="2">CORTES PREMIUM</text>
  </g>
  <g transform="translate(48 330)">
    <text x="0" y="0" fill="#ffffff" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="800">New York</text>
    <text x="0" y="42" fill="rgba(255,255,255,.84)" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">C$ 590.00</text>
    <text x="0" y="76" fill="rgba(255,255,255,.54)" font-size="13" font-family="Consolas, monospace" font-weight="700" letter-spacing="2">NEW YORK</text>
  </g>
</svg>
