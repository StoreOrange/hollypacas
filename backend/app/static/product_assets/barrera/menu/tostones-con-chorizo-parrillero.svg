      <stop offset="0%" stop-color="#ffe28a" stop-opacity=".70"/>
      <stop offset="100%" stop-color="#ffb703" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-tostones-con-chorizo-parrillero" x="-20%" y="-20%" width="140%" height="140%">
