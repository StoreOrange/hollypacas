<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Tostones con Carne">
  <defs>
    <linearGradient id="bg-tostones-con-carne" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c220f">
        <animate attributeName="stop-color" values="#2c220f;#8d6a1f;#2c220f" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8d6a1f">
        <animate attributeName="stop-color" values="#8d6a1f;#2c220f;#8d6a1f" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="halo-tostones-con-carne" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#ffe28a" stop-opacity=".70"/>
      <stop offset="100%" stop-color="#ffb703" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-tostones-con-carne" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#bg-tostones-con-carne)"/>
  <circle cx="320" cy="210" r="154" fill="url(#halo-tostones-con-carne)" filter="url(#blur-tostones-con-carne)">
    <animate attributeName="r" values="146;164;146" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <path d="M58 84c118-62 406-74 522 10" stroke="rgba(255,255,255,.10)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <path d="M84 368c136 64 346 64 472 0" stroke="rgba(255,255,255,.08)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <g opacity=".16">
