<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Gallo Pinto">
  <defs>
    <linearGradient id="bg-gallo-pinto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d2232">
        <animate attributeName="stop-color" values="#1d2232;#40577a;#1d2232" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#40577a">
        <animate attributeName="stop-color" values="#40577a;#1d2232;#40577a" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="halo-gallo-pinto" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#b9d6f2" stop-opacity=".70"/>
      <stop offset="100%" stop-color="#4ea8de" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-gallo-pinto" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#bg-gallo-pinto)"/>
  <circle cx="320" cy="210" r="154" fill="url(#halo-gallo-pinto)" filter="url(#blur-gallo-pinto)">
