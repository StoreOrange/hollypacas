    <circle cx="290" cy="206" r="18" fill="rgba(255,255,255,.68)"/>
    <circle cx="316" cy="196" r="18" fill="rgba(255,255,255,.78)"/>
    <circle cx="344" cy="214" r="18" fill="rgba(104,76,60,.88)"/>
