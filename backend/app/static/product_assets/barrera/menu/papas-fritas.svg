    </radialGradient>
    <filter id="blur-papas-fritas" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#bg-papas-fritas)"/>
