      <stop offset="100%" stop-color="#ff7b54" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-pollo-asado" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#bg-pollo-asado)"/>
